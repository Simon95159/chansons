            { word: "Cerises", color: "red", title: "Le Temps des cerises", lyrics: "Quand nous chanterons, le temps des cerises,\nEt gai rossignol et merle moqueur,\nSeront tous en fête.\nLes belles auront la folie en tête,\nEt les amoureux du soleil au cœur,\nQuand nous chanterons, le temps des cerises,\nSifflera bien mieux le merle moqueur.\n\nMais il est bien court, le temps des cerises,\nOù l’on s’en va deux cueillir en rêvant,\nDes pendants d’oreilles,\nCerises d’amour aux robes pareilles,\nTombant sous la feuille en gouttes de sang.\nMais il est bien court, le temps des cerises,\nPendant de corail qu’on cueille en rêvant.\n\nQuand vous en serez au temps des cerises,\nSi vous avez peur des chagrins d’amour,\nÉvitez les belles !\nMoi qui ne crains pas les peines cruelles,\nJe ne vivrai point sans souffrir un jour.\nQuand vous en serez au temps des cerises,\nVous aurez aussi des peines d’amour.\n\nJ’aimerai toujours le temps des cerises,\nC’est de ce temps-là que je garde au cœur\nUne plaie ouverte.\nEt Dame Fortune, en m’étant offerte,\nNe pourra jamais fermer ma douleur.\nJ’aimerai toujours le temps des cerises,\nEt le souvenir que je garde au cœur.", yt: "https://m.youtube.com/results?search_query=le+temps+des+cerises", spoti: "https://open.spotify.com/search/le%20temps%20des%20cerises" },

            { word: "Patrouilles", color: "green", title: "Cantique des patrouilles", lyrics: "Seigneur, rassemblés près des tentes\nPour saluer la fin du jour,\nTes fils laissent leurs voix chantantes\nVoler vers Toi, pleines d’amour :\nTu dois aimer l’humble prière\nQui de ce camp s’en va monter,\nO Toi, qui n’avait sur la terre\nPas de maison pour t’abriter !\n\nRefrain\nNous venons toutes les patrouilles,\nTe prier pour Te servir mieux,\nVois au bois silencieux,\nTes scouts qui s’agenouillent !\nBénis-les, ô Jésus dans les Cieux !\n\nMerci de ce jour d’existence\nOù Ta bonté nous conserva ;\nMerci de Ta sainte présence\nQui de tout mal nous préserva.\nMerci du bien fait par la troupe,\nMerci des bons conseils reçus,\nMerci de l’amour qui nous groupe\nComme des frères, ô Jésus.\n\nRefrain\n\nNos cœurs ont-ils perdu Ta grâce ?\nPardonne encore à nos erreurs ;\nSeigneur, que Ta clémence efface\nLes péchés de Tes éclaireurs.\nEt que rempli de l’allégresse\nD’avoir répété son serment,\nChacun s’endorme en la promesse\nDe Te servir fidèlement.\n\nRefrain\n\nÔ Toi qui veillais Tes apôtres\nEt les bordais durant la nuit,\nDéfends notre camp et les autres\nDes rondes du Malin Esprit !\nMonte la garde, ô notre Guide,\nAfin que nous puissions demain\nOuvrir des yeux toujours limpides\nDevant l’Étoile du Matin.\n\nRefrain", yt: "https://m.youtube.com/results?search_query=cantique+des+patrouilles", spoti: "https://open.spotify.com/search/cantique%20des%20patrouilles" },

// This sorts by 'word' automatically
        songs.sort((a, b) => a.word.localeCompare(b.word));

        const searchInput = document.getElementById('searchInput');
        const grid = document.getElementById('song-grid');

        function renderSongs(filter = "") {
            grid.innerHTML = "";
            const filtered = songs.filter(s => 
                s.title.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").includes(filter.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "")) || 
                s.word.toLowerCase().includes(filter.toLowerCase())
            );

            filtered.forEach((song) => {
                const index = songs.indexOf(song);
                const card = document.createElement('div');
						
			// We map your color names to Tailwind background classes
			const colorMap = {
				blue: "bg-blue-100 dark:bg-blue-900/30 border-blue-200 dark:border-blue-800",
				green: "bg-green-100 dark:bg-green-900/30 border-green-200 dark:border-green-800",
				red: "bg-red-100 dark:bg-red-900/30 border-red-200 dark:border-red-800",
				amber: "bg-amber-100 dark:bg-amber-900/30 border-amber-200 dark:border-amber-800",
				purple: "bg-purple-100 dark:bg-purple-900/30 border-purple-200 dark:border-purple-800",
				rose: "bg-rose-100 dark:bg-rose-900/30 border-rose-200 dark:border-rose-800",
				default: "bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700"
			};

			const chosenColor = colorMap[song.color] || colorMap.default;

			// We apply the chosen color to the card
			card.className = `song-card ${chosenColor} border rounded-2xl flex items-center justify-center shadow-sm active:scale-90 transition-all cursor-pointer text-center p-2`;
			
			// Update text color to look better on colored backgrounds
			const textColor = song.color ? "text-slate-800 dark:text-slate-100" : "text-indigo-600 dark:text-indigo-400";
							
                card.innerHTML = `<span class="card-text text-indigo-600 dark:text-indigo-400 break-words">${song.word}</span>`;
                card.onclick = () => openLyrics(index);
                grid.appendChild(card);
            });
        }

        function openLyrics(index) {
            const song = songs[index];
            const googleLink = document.getElementById('link-google');
            document.getElementById('modal-title').innerText = song.title;
            document.getElementById('modal-lyrics').innerText = song.lyrics || "Paroles à ajouter...";
            document.getElementById('link-yt').href = song.yt;
            document.getElementById('link-spoti').href = song.spoti;
            
            if(!song.lyrics || song.lyrics === "") {
                googleLink.classList.remove('hidden');
                googleLink.href = `https://www.google.com/search?q=paroles+${encodeURIComponent(song.title)}`;
            } else {
                googleLink.classList.add('hidden');
            }
            document.getElementById('lyrics-modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeLyrics() {
            document.getElementById('lyrics-modal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        function toggleDarkMode() {
            const html = document.documentElement;
            const icon = document.getElementById('dark-icon');
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                icon.innerText = "🌙";
                localStorage.setItem('theme', 'light');
            } else {
                html.classList.add('dark');
                icon.innerText = "☀️";
                localStorage.setItem('theme', 'dark');
            }
        }

        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
            document.getElementById('dark-icon').innerText = "☀️";
        }
        
        searchInput.addEventListener('input', (e) => renderSongs(e.target.value));
        renderSongs();
    </script>
